<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Arrays y Bucles FOR - JavaScript</title>
</head>

<body>

    <h1>Ejercicios del Video: Arrays y Bucles</h1>

    <button onclick="verAlineacion()">Ver Jugador por Posición</button>
    <button onclick="calcularFactorial()">Calcular Factorial</button>
    <button onclick="tablaMultiplicar()">Generar Tabla Multiplicar</button>
    <button onclick="imprimeAlineacion()">Imprimir Alineación Completa</button>

    <script>
        function verAlineacion() {
            let alineacion = ["Courtois", "Carvajal", "Ramos", "Benzema"];
            let posicion = prompt("Dime una posición (0 a 3):");

            if (alineacion[posicion] !== undefined) {
                alert("En la posición " + posicion + " está: " + alineacion[posicion]);
            } else {
                alert("Esa posición no existe en el equipo.");
            }
        }

        function calcularFactorial() {
            let numero = parseInt(prompt("Dime un número para calcular su factorial:"));
            let factorial = 1;

            for (let i = 1; i <= numero; i++) {
                factorial = factorial * i;
            }
            alert("El factorial de " + numero + " es: " + factorial);
        }

        function tablaMultiplicar() {
            let num = parseInt(prompt("¿De qué número quieres la tabla?"));

            document.write("<h1>Tabla del " + num + "</h1>");
            document.write("<table border='1'>");

            for (let i = 1; i <= 10; i++) {
                document.write("<tr>");
                document.write("<td>" + num + " x " + i + "</td>");
                document.write("<td>" + (num * i) + "</td>");
                document.write("</tr>");
            }
            document.write("</table>");
        }

        function imprimeAlineacion() {
            let alineacion = ["Courtois", "Carvajal", "Ramos", "Benzema", "Modric", "Kroos"];

            document.write("<h2>Alineación Completa:</h2>");

            for (let i = 0; i < alineacion.length; i++) {
                document.write("Jugador " + i + ": " + alineacion[i] + "<br>");
            }
        }
    </script>

</body>

</html>
